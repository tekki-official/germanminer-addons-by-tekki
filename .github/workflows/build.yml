name: Build

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build files
        run: |
          mkdir build
          echo "Hallo" > build/test.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build
